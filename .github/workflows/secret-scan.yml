name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tracked-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for credential patterns
        run: python scripts/check_no_secrets.py

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q .
      - name: Import bot modules without network calls
        env:
          AMO_DOMAIN: example.amocrm.ru
          AMO_CLIENT_ID: test
          AMO_CLIENT_SECRET: test
          AMO_REDIRECT_URI: https://example.test
          AMO_REFRESH_TOKEN: test
          OPENAI_API_KEY: test
        run: python -c "import handlers; assert handlers.router"
